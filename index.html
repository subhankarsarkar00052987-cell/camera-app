<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Vivo Y20 Camera Pro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; }
.app { width: 100%; height: 100vh; display: flex; flex-direction: column; background: #000; }
.camera-section { flex: 1; position: relative; background: #000; overflow: hidden; }
video { width: 100%; height: 100%; object-fit: cover; display: block; }
canvas { display: none; }
.grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.3; }
.grid-line { position: absolute; background: rgba(255, 255, 255, 0.2); }
.grid-v { width: 1px; height: 100%; left: 33.33%; }
.grid-v2 { width: 1px; height: 100%; left: 66.66%; }
.grid-h { width: 100%; height: 1px; top: 33.33%; }
.grid-h2 { width: 100%; height: 1px; top: 66.66%; }
.controls { background: rgba(0, 0, 0, 0.85); padding: 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.btn { background: transparent; border: 0.5px solid rgba(255, 255, 255, 0.5); color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 200ms; touch-action: manipulation; }
.btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.1); }
.btn.primary { background: #1D9E75; border: none; font-weight: 500; }
.btn.primary:active { background: #0F6E56; }
.shutter { width: 56px; height: 56px; border-radius: 50%; background: #fff; border: 3px solid rgba(255, 255, 255, 0.6); cursor: pointer; flex-shrink: 0; transition: all 100ms; touch-action: manipulation; }
.shutter:active { transform: scale(0.92); background: #e0e0e0; }
.gallery { background: rgba(0, 0, 0, 0.9); border-top: 0.5px solid rgba(255, 255, 255, 0.1); padding: 8px; max-height: 60px; overflow-x: auto; display: flex; gap: 6px; }
.thumb { width: 48px; height: 48px; border-radius: 4px; background: #333; cursor: pointer; border: 2px solid transparent; transition: border 150ms; flex-shrink: 0; }
.thumb:active { border-color: #fff; }
.thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; display: block; }
.status { position: absolute; bottom: 12px; left: 12px; font-size: 12px; color: rgba(255, 255, 255, 0.7); background: rgba(0, 0, 0, 0.6); padding: 4px 8px; border-radius: 4px; }
.mode-indicator { position: absolute; top: 12px; left: 12px; font-size: 11px; color: rgba(255, 255, 255, 0.6); background: rgba(0, 0, 0, 0.6); padding: 4px 8px; border-radius: 4px; }
.settings-btn { width: 32px; height: 32px; background: rgba(255, 255, 255, 0.1); border: 0.5px solid rgba(255, 255, 255, 0.3); border-radius: 6px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; touch-action: manipulation; }
.settings-panel { position: absolute; top: 0; right: 0; width: 160px; background: rgba(20, 20, 20, 0.95); border-left: 0.5px solid rgba(255, 255, 255, 0.1); padding: 12px; display: none; flex-direction: column; gap: 12px; z-index: 10; max-height: 240px; overflow-y: auto; }
.settings-panel.active { display: flex; }
.setting-item { display: flex; flex-direction: column; gap: 4px; }
.setting-label { font-size: 11px; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; letter-spacing: 0.5px; }
.setting-control { display: flex; gap: 4px; }
.setting-control button { flex: 1; padding: 4px 6px; font-size: 11px; background: rgba(255, 255, 255, 0.05); border: 0.5px solid rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.7); border-radius: 4px; cursor: pointer; transition: all 150ms; touch-action: manipulation; }
.setting-control button.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.9); color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 12px; border: 0.5px solid rgba(255, 255, 255, 0.2); animation: slideUp 300ms ease-out; z-index: 20; display: none; pointer-events: none; }
@keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>
<div class="app">
  <div class="camera-section">
    <div class="mode-indicator">Photo Mode</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="grid">
      <div class="grid-line grid-v"></div>
      <div class="grid-line grid-v2"></div>
      <div class="grid-line grid-h"></div>
      <div class="grid-line grid-h2"></div>
    </div>
    <div class="settings-panel" id="settingsPanel">
      <div class="setting-item">
        <div class="setting-label">Camera</div>
        <div class="setting-control">
          <button id="camFront" class="active">Front</button>
          <button id="camBack">Back</button>
        </div>
      </div>
      <div class="setting-item">
        <div class="setting-label">Quality</div>
        <div class="setting-control">
          <button id="qualityLow">Low</button>
          <button id="qualityMid" class="active">Mid</button>
          <button id="qualityHigh">High</button>
        </div>
      </div>
      <div class="setting-item">
        <div class="setting-label">Grid</div>
        <div class="setting-control">
          <button id="gridOff">Off</button>
          <button id="gridOn" class="active">On</button>
        </div>
      </div>
    </div>
    <div class="status" id="status">Ready</div>
  </div>
  
  <div class="controls">
    <button class="settings-btn" id="settingsToggle">⚙️</button>
    <div style="flex: 1; display: flex; justify-content: center;">
      <button class="shutter" id="captureBtn"></button>
    </div>
    <button class="btn" id="downloadBtn">💾</button>
  </div>
  
  <div class="gallery" id="gallery"></div>
</div>

<div id="toast"></div>

<script>
let stream = null;
let facingMode = 'user';
let quality = 'mid';
let photos = [];
let gridEnabled = true;
let isCapturing = false;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const captureBtn = document.getElementById('captureBtn');
const galleryEl = document.getElementById('gallery');
const toast = document.getElementById('toast');
const settingsPanel = document.getElementById('settingsPanel');
const settingsToggle = document.getElementById('settingsToggle');
const gridEl = document.querySelector('.grid');
const statusEl = document.getElementById('status');
const downloadBtn = document.getElementById('downloadBtn');

function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2000);
}

async function startCamera() {
  try {
    const constraints = {
      audio: false,
      video: {
        facingMode: facingMode,
        width: { ideal: 1280 },
        height: { ideal: 960 }
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    statusEl.textContent = '✓ Camera Ready';
  } catch (err) {
    statusEl.textContent = '✗ Camera Access Denied';
    showToast('Please allow camera access in settings');
    console.error('Camera error:', err);
  }
}

async function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
}

function capturePhoto() {
  if (isCapturing || !stream) return;
  isCapturing = true;
  
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    photos.unshift({ url, time: new Date() });
    
    if (photos.length > 20) {
      const old = photos.pop();
      URL.revokeObjectURL(old.url);
    }
    
    updateGallery();
    showToast('Photo captured ✓');
    isCapturing = false;
  }, 'image/jpeg', quality === 'high' ? 0.92 : quality === 'mid' ? 0.85 : 0.75);
}

function updateGallery() {
  galleryEl.innerHTML = '';
  photos.forEach((photo, idx) => {
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    const img = document.createElement('img');
    img.src = photo.url;
    img.alt = `Photo ${idx}`;
    thumb.appendChild(img);
    
    thumb.addEventListener('click', () => {
      downloadPhoto(photo.url, idx);
    });
    
    galleryEl.appendChild(thumb);
  });
}

function downloadPhoto(url, idx) {
  const a = document.createElement('a');
  a.href = url;
  a.download = `photo_${new Date().getTime()}_${idx}.jpg`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('Downloading...');
}

async function switchCamera(newFacingMode) {
  facingMode = newFacingMode;
  await stopCamera();
  await startCamera();
  showToast(newFacingMode === 'user' ? 'Front camera' : 'Back camera');
}

captureBtn.addEventListener('click', capturePhoto);

settingsToggle.addEventListener('click', () => {
  settingsPanel.classList.toggle('active');
});

document.getElementById('camFront').addEventListener('click', async (e) => {
  document.querySelectorAll('.setting-control')[0].querySelectorAll('button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  await switchCamera('user');
});

document.getElementById('camBack').addEventListener('click', async (e) => {
  document.querySelectorAll('.setting-control')[0].querySelectorAll('button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  await switchCamera('environment');
});

['Low', 'Mid', 'High'].forEach((q) => {
  const key = q.toLowerCase();
  document.getElementById(`quality${q}`).addEventListener('click', (e) => {
    quality = key;
    document.querySelectorAll('.setting-control')[1].querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    showToast(`Quality: ${q}`);
  });
});

document.getElementById('gridOff').addEventListener('click', (e) => {
  gridEnabled = false;
  document.querySelectorAll('.setting-control')[2].querySelectorAll('button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  gridEl.style.opacity = '0';
});

document.getElementById('gridOn').addEventListener('click', (e) => {
  gridEnabled = true;
  document.querySelectorAll('.setting-control')[2].querySelectorAll('button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  gridEl.style.opacity = '0.3';
});

// Prevent screen from sleeping while using camera
document.addEventListener('touchmove', (e) => {
  if (e.target.closest('.gallery')) {
    e.preventDefault();
  }
});

startCamera();
</script>
</body>
</html>
